name: Deploy Green Agent

# Green agent lives in this repo (agent-bench).
# Purple agent lives in github.com/abhishec/purple-agent — deployed from there.

on:
  push:
    branches: [main]
    paths:
      - 'green-agent/**'
      - 'buildspec.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip CodeBuild (just redeploy ECS from existing ECR image)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: nexusbrain-training
  CODEBUILD_PROJECT: agentbench-image-builder
  S3_BUCKET: nexusbrain-codebuild-source-848269696611
  S3_KEY: agentbench/source.zip
  GREEN_SERVICE: agentbench-green
  GREEN_TASK_DEF: agentbench-green:5
  GREEN_URL: https://benchmark.usebrainos.com
  PURPLE_URL: https://purple.agentbench.usebrainos.com

permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build green image via CodeBuild
  # ─────────────────────────────────────────────
  build:
    name: Build (CodeBuild → ECR)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848269696611:role/agentbench-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Zip and upload source to S3
        run: |
          zip -r /tmp/source.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".github/*" \
            -q
          aws s3 cp /tmp/source.zip s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}
          echo "✅ Source uploaded ($(du -sh /tmp/source.zip | cut -f1))"

      - name: Start CodeBuild
        id: start_build
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name ${{ env.CODEBUILD_PROJECT }} \
            --query 'build.id' --output text)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "🔨 Build started: $BUILD_ID"

      - name: Wait for CodeBuild
        run: |
          BUILD_ID="${{ steps.start_build.outputs.build_id }}"
          for i in $(seq 1 60); do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text)
            echo "[$i] $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Build succeeded"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "STOPPED" ]; then
              LOGS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
                --query 'builds[0].logs.deepLink' --output text)
              echo "❌ Build $STATUS — logs: $LOGS"
              exit 1
            fi
            sleep 20
          done
          echo "❌ Timed out"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 2: Deploy Green ECS service
  # ─────────────────────────────────────────────
  deploy-green:
    name: Deploy Green → ECS
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848269696611:role/agentbench-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy green ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.GREEN_SERVICE }} \
            --task-definition ${{ env.GREEN_TASK_DEF }} \
            --force-new-deployment \
            --query 'service.serviceName' --output text
          echo "🚀 Green deployment triggered"

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.GREEN_SERVICE }}
          echo "✅ Green service stable"

      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            R=$(curl -sf ${{ env.GREEN_URL }}/health 2>/dev/null || echo "")
            if echo "$R" | grep -q '"status":"ok"'; then
              echo "✅ Green healthy: $R"
              exit 0
            fi
            echo "[$i] not ready, waiting 15s..."
            sleep 15
          done
          echo "❌ Health check failed"
          exit 1

      - name: Verify agent card
        run: |
          CARD=$(curl -sf ${{ env.GREEN_URL }}/.well-known/agent-card.json)
          VERSION=$(echo "$CARD" | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          URL=$(echo "$CARD" | python3 -c "import json,sys; print(json.load(sys.stdin)['url'])")
          SKILLS=$(echo "$CARD" | python3 -c "import json,sys; print(len(json.load(sys.stdin)['skills']))")
          echo "version=$VERSION  url=$URL  skills=$SKILLS"
          [ "$URL" = "${{ env.GREEN_URL }}" ] && echo "✅ Card correct" || echo "⚠️ URL mismatch: $URL"

  # ─────────────────────────────────────────────
  # JOB 3: Smoke test (green → purple end-to-end)
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (green → purple)
    runs-on: ubuntu-latest
    needs: deploy-green
    if: always() && needs.deploy-green.result == 'success'

    steps:
      - name: Run benchmark task_06 + task_24
        run: |
          echo "🧪 Smoke test: task_06 (operations) + task_24 (banking)..."
          # Fetch BENCHMARK_API_KEY from SSM (OIDC role has SSM read access)
          BENCH_KEY=$(aws ssm get-parameter \
            --name /agentbench/benchmark-api-key \
            --with-decryption --query Parameter.Value --output text)
          RESULT=$(curl -sf -X POST ${{ env.GREEN_URL }}/benchmark/batch \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $BENCH_KEY" \
            -d '{
              "task_ids": ["task_06", "task_24"],
              "purple_url": "${{ env.PURPLE_URL }}",
              "difficulty": "none"
            }')
          PASSED=$(echo "$RESULT" | python3 -c "import json,sys; r=json.load(sys.stdin,strict=False); print(r['passed'])")
          TOTAL=$(echo "$RESULT" | python3 -c "import json,sys; r=json.load(sys.stdin,strict=False); print(r['total'])")
          RATE=$(echo "$RESULT" | python3 -c "import json,sys; r=json.load(sys.stdin,strict=False); print(r['pass_rate'])")
          echo "$RESULT" | python3 -c "
          import json,sys
          r=json.load(sys.stdin,strict=False)
          for t in r['results']:
              s=t['scores'].get('overall',0)
              print(f'  {t[\"task_id\"]}: {s}/100 — {\"✅ PASS\" if s>=70 else \"❌ FAIL\"}')
          "
          echo "Result: $PASSED/$TOTAL passed (rate=$RATE)"
          [ "$RATE" = "1.0" ] && echo "✅ Smoke test PASSED" || echo "⚠️ Partial pass: $PASSED/$TOTAL"
        timeout-minutes: 5
